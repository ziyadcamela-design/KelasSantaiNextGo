<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Kalkulator</h1>
    <form action="">
        <label for="num1">Angka 1</label>
        <input type="number" id="num1">
        <label for="num2">Angka 2</label>
        <input type="number" id="num2">
    </form>

    <button onclick="tambah()">Tambah</button>
    <button onclick="kurang()">Kurang</button>
    <button onclick="kali()">Kali</button>
    <button onclick="bagi()">Bagi</button>
    <button onclick="modulus()">Modulus</button>
    <button onclick="clearData()">Clear</button>

    <div id="hasil" style="margin-top: 10px; font-size: 20px;"></div>
    <ul id="history"></ul>


    <h2>Konverter Celcius</h2>
    <input type="number" id="celcius">
    <button onclick="celciusToFahrenheit()">Celcius to Fahrenheit</button>
    <button onclick="fahrenheitToCelcius()">Fahrenheit to Celcius</button>
    <div id="hasilCelcius" style="margin-top: 10px; font-size: 20px;"></div>
    <script>

        // Tugas 1
        let history = [];

        function simpan(hasil){
            history.unshift(hasil);
            history = history.slice(0, 3);

            let list = document.getElementById("history");
            list.innerHTML = "";

            history.forEach(function(item){
                let li = document.createElement("li");
                li.innerHTML = item;
                list.appendChild(li);
            });
        }     

        function tambah(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            let hasil = parseInt(num1) + parseInt(num2);
            document.getElementById("hasil").innerHTML = hasil;
            simpan(hasil);
        }

        function kurang(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            let hasil = parseInt(num1) - parseInt(num2);
            document.getElementById("hasil").innerHTML = hasil;
            simpan(hasil);
        }

        function kali(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            let hasil = parseInt(num1) * parseInt(num2);
            document.getElementById("hasil").innerHTML = hasil;
            simpan(hasil);
        }

        function bagi(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            let hasil = parseInt(num1) / parseInt(num2);
            document.getElementById("hasil").innerHTML = hasil;
            simpan(hasil);
        }

        function modulus(){
            let num1 = document.getElementById("num1").value;
            let num2 = document.getElementById("num2").value;
            let hasil = parseInt(num1) % parseInt(num2); // FIX DISINI
            document.getElementById("hasil").innerHTML = hasil;
            simpan(hasil);
        }

        function clearData(){ 
            document.getElementById("num1").value = "";
            document.getElementById("num2").value = "";
            document.getElementById("hasil").innerHTML = "";
        }
        
        // Tugas 2
        function celciusToFahrenheit(){
            let celcius = document.getElementById("celcius").value;
            let fahrenheit = parseInt(celcius) * 9/5 + 32;
            document.getElementById("hasilCelcius").innerHTML = fahrenheit;
        }

        function fahrenheitToCelcius(){
            let fahrenheit = document.getElementById("celcius").value;
            let celcius = (parseInt(fahrenheit) - 32) * 5/9;
            document.getElementById("hasilCelcius").innerHTML = celcius;
        }
        
        // Tugas 3
        for(let i = 0; i < 100; i++){
            if(i % 10 == 0){
                console.log("fizzBuzz");
            }else if(i % 3 == 0){
                console.log("fizz");
            }else if(i % 5 == 0){
                console.log("buzz");
            }else{
                console.log(i);
            }
        }

        
    </script>
</body>
</html>
